# Repo-Insight Docker Compose
# Usage:
#   docker compose up -d          # Start FalkorDB + Streamlit app
#   docker compose up falkordb    # Start only FalkorDB (for local dev)
#
# For the SGLang inference server, run separately on the GPU host:
#   python -m sglang.launch_server --model-path Qwen/Qwen3-8B --port 30000
#   python -m sglang.launch_server --model-path Qwen/Qwen3-Coder-Next --port 30001

