services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    volumes:
      - /mnt/nvme/falkordb_data:/data # Use NVMe for DB persistence
    command: [ "redis-server", "--loadmodule", "/opt/falkordb/falkordb.so", "--save", "60", "1" ]
    networks:
      - repo_net

  app:
    build: .
    container_name: repo-insight-app
    environment:
      - SGLANG_BASE_URL=http://rocm:30000/v1
      - EMBED_BASE_URL=http://rocm:30001
      - FALKORDB_HOST=falkordb
    volumes:
      - /mnt/nvme/benchmarks:/workspace # Use NVMe for cloning repos
      - ./patches:/app/patches
    networks:
      - repo_net

networks:
  repo_net:
    name: repo-insight_default
