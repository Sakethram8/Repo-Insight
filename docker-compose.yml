services:

  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    volumes:
      - /mnt/nvme/falkordb_data:/data
    command:
      - redis-server
      - --loadmodule
      - /opt/falkordb/falkordb.so
      - --save
      - "60"
      - "1"
    networks:
      - repo_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: repo-insight-app
    env_file: .env                        # pulls ALL values from .env
    environment:
      # Network-topology vars override .env — these depend on container hostnames
      - SGLANG_BASE_URL=http://rocm:30000/v1
      - EMBED_BASE_URL=http://rocm:30001
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      # Clone temp dirs go to NVMe-backed /workspace, not container /tmp
      - TMPDIR=/workspace
    volumes:
      - /mnt/nvme/benchmarks:/workspace
      - ./patches:/app/patches
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    networks:
      - repo_net
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped

networks:
  repo_net:
    name: repo-insight_default
